name: Upload File

on:
  schedule:
    - cron: '15 3 * * *'   # targets 8:45 AM IST (buffer for delay, actual 9:00 AM IST)
    - cron: '15 7 * * *'   # targets 12:45 PM IST (buffer for delay, actual 1:00 PM IST)
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24

    - run: npm ci

    - name: Install Google Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test tests/upload.spec.ts
      env:
        NAUKRI_USERNAME: ${{ secrets.NAUKRI_USERNAME }}
        NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
